version: '3'
services:
  backend:
    image: gauravmawari/louder-backend
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}

  frontend:
    image: gauravmawari/louder-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend